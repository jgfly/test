name: Docker Image Downloader (Official Source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        run: |
          # vLLM 镜像很大，必须清理掉运行器自带的缓存以防溢出
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost"
          sudo docker image prune -a -f

      - name: Pull and Save Docker Image
        run: |
          # 直接使用官方 Docker Hub 地址
          IMAGE_NAME="docker.io/vllm/vllm-openai:v0.19.1"
          FILE_NAME="vllm_v0.19.1.tar"
          
          echo "正在从 Docker Hub 官方源拉取..."
          docker pull $IMAGE_NAME
          
          echo "正在保存并压缩 (使用 zstd 压缩速度更快)..."
          # 使用 zstd 替代 gzip，在处理 10GB+ 镜像时效率更高
          docker save $IMAGE_NAME | zstd -o ${FILE_NAME}.zst

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vllm-official-image
          path: vllm_v0.19.1.tar.zst
          retention-days: 1
